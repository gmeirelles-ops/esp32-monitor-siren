name: sirene_app
description: App Flutter companion para validador de sirenes Diponto (Windows desktop).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  mqtt_client: ^10.3.0
  drift: ^2.22.1
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  webview_flutter: ^4.10.0
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.5
  firebase_auth: ^5.5.1
  file_selector: ^1.0.3
  win32: ^5.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
