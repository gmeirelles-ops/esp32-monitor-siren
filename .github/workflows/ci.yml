name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-test:
    name: Flutter tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sirene_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

  firmware-host-tests:
    name: Firmware host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build and run host tests
        run: |
          cd sirene-validator/host_tests
          cmake -B build
          cmake --build build
          ctest --test-dir build --output-on-failure

  firmware-idf-build:
    name: Firmware IDF build (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: ESP-IDF setup
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32

      - name: Build firmware
        run: |
          cd sirene-validator
          idf.py -B build build

  windows-release:
    name: Windows portable release
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Build portable ZIP
        shell: pwsh
        run: ./scripts/build_windows_release.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DipontoSireneValidator-win64
          path: dist/*.zip
          if-no-files-found: error
